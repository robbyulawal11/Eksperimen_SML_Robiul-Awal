name: Data Preprocessing

on:
  push:
    paths:
      - 'dataset/inflow.csv'
      - 'preprocessing/automate_Robiul-Awal.py'
  workflow_dispatch:

jobs:
  preprocess:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn joblib

      - name: Run preprocessing script
        run: |
          # Jalankan dari root agar direktori 'dataset/' terbaca
          python preprocessing/automate_Robiul-Awal.py
          
      - name: Upload Processed Dataset as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: preprocessed-dataset
          path: preprocessing/inflow_preprocessing/*.csv
          retention-days: 7

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dataset/ preprocessing/inflow_preprocessing/ || true
          git commit -m "chore: Auto-update preprocessed datasets" || echo "No changes to commit"
          git push
