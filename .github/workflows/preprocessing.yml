name: Data Preprocessing

on:
  push:
    paths:
      - 'dataset/inflow.csv'
      - 'preprocessing/automate_Robiul-Awal.py'
  workflow_dispatch:

jobs:
  preprocess:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn joblib

      - name: Run preprocessing script
        run: |
          cd preprocessing
          python automate_Robiul-Awal.py
          mkdir -p inflow_preprocessing
          mv ../dataset/*.csv inflow_preprocessing/

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add preprocessing/inflow_preprocessing/
          git commit -m "Auto-update preprocessed dataset" || echo "No changes to commit"
          git push
